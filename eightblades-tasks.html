<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Eight Blades — مركز الموظفين</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;background:#0a0a0a;color:#f0f0f0;height:100dvh;overflow:hidden}
:root{--c1:#111;--c2:#1a1a1a;--bd:#2a2a2a;--mt:#666;--yw:#e2f500;--gr:#22c55e;--rd:#ef4444;--bl:#3b82f6;--or:#f97316}
#ld{position:fixed;inset:0;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px}
.ld-logo{background:var(--yw);color:#0a0a0a;font-size:18px;font-weight:900;padding:10px 24px;border-radius:12px}
.ld-txt{font-size:12px;color:var(--mt)}
.ld-bar{width:180px;height:3px;background:#222;border-radius:2px;overflow:hidden}
.ld-fill{height:100%;background:var(--yw);animation:ldp 1.4s ease-in-out infinite}
@keyframes ldp{0%,100%{width:0%;margin-right:100%}50%{width:60%;margin-right:0%}}
#lg{display:none;flex-direction:column;align-items:center;justify-content:center;height:100dvh;gap:16px;padding:24px;text-align:center}
#app{display:none;flex-direction:column;height:100dvh}
.topbar{background:var(--c1);border-bottom:1px solid var(--bd);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tb-av{width:32px;height:32px;border-radius:50%;background:var(--yw);color:#0a0a0a;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900}
.tb-name{font-size:12px;font-weight:700}.tb-role{font-size:10px;color:var(--mt)}
.tb-logo{font-size:13px;font-weight:900;color:var(--yw)}
.tbtn{background:var(--c2);border:1px solid var(--bd);border-radius:8px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;color:#f0f0f0}
.content{flex:1;overflow-y:auto}
.screen{display:none;padding:14px;padding-bottom:80px}.screen.on{display:block}
.nav{background:var(--c1);border-top:1px solid var(--bd);display:flex;justify-content:space-around;padding:8px 0;flex-shrink:0}
.nit{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 12px;cursor:pointer;opacity:.45}.nit.on{opacity:1}.nit.on .nlb{color:var(--yw)}
.nic{font-size:20px}.nlb{font-size:9px;color:var(--mt);font-weight:600}
.card{background:var(--c1);border:1px solid var(--bd);border-radius:14px;margin-bottom:12px;overflow:hidden}
.card-hd{padding:12px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:700}
.row{padding:11px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}.row:last-child{border-bottom:none}
.row-main{font-size:13px;font-weight:600}.row-sub{font-size:10px;color:var(--mt);margin-top:2px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sht{font-size:16px;font-weight:900}.empty{text-align:center;color:var(--mt);padding:32px;font-size:13px}
.badge{display:inline-flex;padding:2px 8px;border-radius:50px;font-size:10px;font-weight:700;white-space:nowrap}
.bg{background:rgba(34,197,94,.15);color:var(--gr)}.br{background:rgba(239,68,68,.15);color:var(--rd)}
.bb{background:rgba(59,130,246,.15);color:var(--bl)}.bo{background:rgba(249,115,22,.15);color:var(--or)}
.btn{border:none;border-radius:10px;padding:10px 16px;font-size:12px;font-weight:700;cursor:pointer}
.btn-y{background:var(--yw);color:#0a0a0a}
.btn-sm{background:var(--c2);border:1px solid var(--bd);border-radius:8px;padding:5px 10px;font-size:11px;cursor:pointer;color:#f0f0f0}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}.fg label{font-size:11px;color:var(--mt);font-weight:600}
.fg input,.fg select,.fg textarea{background:var(--c2);border:1px solid var(--bd);border-radius:10px;padding:10px 12px;font-size:13px;color:#f0f0f0;font-family:'Cairo',sans-serif;width:100%;outline:none}
.fg textarea{resize:vertical;min-height:80px}.fgr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.mbg.on{opacity:1;pointer-events:all}
.modal{background:var(--c1);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:90dvh;overflow-y:auto;transform:translateY(100%);transition:transform .3s}
.mbg.on .modal{transform:translateY(0)}
.mhandle{width:36px;height:4px;background:var(--bd);border-radius:2px;margin:12px auto 4px}
.minner{padding:0 16px 24px}.mtitle{font-size:15px;font-weight:900;margin-bottom:16px}
.toast{position:fixed;bottom:86px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--yw);color:#0a0a0a;padding:9px 20px;border-radius:50px;font-size:12px;font-weight:800;z-index:300;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}.toast.err{background:var(--rd);color:#fff}
.cl-item{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bd)}.cl-item:last-child{border-bottom:none}
.cl-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--bd);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cl-check.done{background:var(--yw);border-color:var(--yw);color:#0a0a0a}
.cl-lbl{font-size:13px;flex:1}.cl-lbl.done{text-decoration:line-through;color:var(--mt)}
.task-card{background:var(--c1);border:1px solid var(--bd);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.task-title{font-size:13px;font-weight:700;margin-bottom:4px}.task-meta{font-size:10px;color:var(--mt)}
.tabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:12px;overflow-x:auto}
.tab{padding:10px 14px;font-size:12px;font-weight:600;color:var(--mt);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}.tab.on{color:var(--yw);border-bottom-color:var(--yw)}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.met{background:var(--c1);border:1px solid var(--bd);border-radius:12px;padding:14px;text-align:center}
.met-n{font-size:24px;font-weight:900;color:var(--yw)}.met-l{font-size:10px;color:var(--mt);margin-top:2px}
.bar-wrap{background:#222;border-radius:3px;height:6px;margin:6px 0}.bar-fill{height:100%;border-radius:3px}
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
</style>
</head>
<body>

<div id="ld">
  <div class="ld-logo">✂ مركز الموظفين</div>
  <div class="ld-bar"><div class="ld-fill"></div></div>
  <div class="ld-txt" id="ld-txt">جاري التحميل...</div>
</div>

<div id="lg">
  <div class="ld-logo">✂ Eight Blades</div>
  <div style="font-size:13px;color:var(--mt)">افتح التطبيق الرئيسي أولاً ثم اضغط 🧭</div>
  <a href="eightblades-app.html" style="background:var(--yw);color:#0a0a0a;padding:12px 28px;border-radius:50px;font-size:13px;font-weight:800;text-decoration:none;margin-top:8px">التطبيق الرئيسي</a>
</div>

<div id="app">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="tb-av" id="tb-av">?</div>
      <div><div class="tb-name" id="tb-name"></div><div class="tb-role" id="tb-role"></div></div>
    </div>
    <div class="tb-logo">✂ Hub</div>
    <button class="tbtn" onclick="doLogout()">خروج</button>
  </div>
  <div class="content">
    <div class="screen on" id="s-tasks">
      <div class="sh"><div class="sht">المهام</div><div id="task-add-btn"></div></div>
      <div class="tabs">
        <div class="tab on" onclick="taskTab(this,'t-mine')">مهامي</div>
        <div class="tab" onclick="taskTab(this,'t-auto')">تلقائية</div>
        <div class="tab" onclick="taskTab(this,'t-all')">الكل</div>
      </div>
      <div id="t-mine"></div>
      <div id="t-auto" style="display:none"></div>
      <div id="t-all" style="display:none"></div>
    </div>
    <div class="screen" id="s-checklists">
      <div class="sh"><div class="sht">قوائم التحقق</div><div class="task-meta" id="cl-date"></div></div>
      <div id="cl-list"></div>
    </div>
    <div class="screen" id="s-reference">
      <div class="sh"><div class="sht">المرجع</div></div>
      <div id="ref-list"></div>
    </div>
    <div class="screen" id="s-analytics">
      <div class="sh"><div class="sht">التحليلات</div></div>
      <div class="metrics" id="an-metrics"></div>
      <div id="an-content"></div>
    </div>
  </div>
  <div class="nav">
    <div class="nit on" id="ni-tasks" onclick="goScreen('tasks')"><span class="nic">✅</span><span class="nlb">المهام</span></div>
    <div class="nit" id="ni-checklists" onclick="goScreen('checklists')"><span class="nic">📋</span><span class="nlb">التحقق</span></div>
    <div class="nit" id="ni-reference" onclick="goScreen('reference')"><span class="nic">📚</span><span class="nlb">المرجع</span></div>
    <div class="nit" id="ni-analytics" onclick="goScreen('analytics')"><span class="nic">📊</span><span class="nlb">التحليلات</span></div>
  </div>
</div>

<div class="mbg" id="m-task"><div class="modal"><div class="mhandle"></div><div class="minner">
  <div class="mtitle">+ مهمة جديدة</div>
  <div class="fg"><label>العنوان</label><input type="text" id="tk-title"></div>
  <div class="fg"><label>الوصف</label><textarea id="tk-desc"></textarea></div>
  <div class="fgr">
    <div class="fg"><label>الأولوية</label><select id="tk-pri"><option value="low">🟢 عادي</option><option value="med">🟡 متوسط</option><option value="high">🔴 عالي</option></select></div>
    <div class="fg"><label>الاستحقاق</label><input type="date" id="tk-due"></div>
  </div>
  <div class="fg"><label>إسناد إلى</label><select id="tk-assign"></select></div>
  <button class="btn btn-y" style="width:100%" onclick="saveTask()">✓ إضافة</button>
</div></div></div>

<div class="mbg" id="m-ref"><div class="modal"><div class="mhandle"></div><div class="minner">
  <div class="mtitle" id="ref-modal-title"></div>
  <div id="ref-modal-content" style="font-size:13px;line-height:1.8;white-space:pre-wrap"></div>
</div></div></div>

<div class="toast" id="toast"></div>

<script>
var SB = 'https://twdehehmddckkzykagjl.supabase.co';
var SK = 'sb_publishable_JDEByCIJNF29WaGfKJ-uFw_PSdGkJDG';
var ME = null, EMPS = [], PRODS = [], TASKS = [];
var TASK_TAB = 't-mine';
var TODAY = new Date().toISOString().split('T')[0];

function SBH() {
  return { 'apikey': SK, 'Authorization': 'Bearer ' + SK, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };
}
function GET(t, q) {
  return fetch(SB + '/rest/v1/' + t + '?' + (q || ''), { headers: SBH() }).then(function(r) { return r.json(); });
}
function INS(t, d) {
  return fetch(SB + '/rest/v1/' + t, { method: 'POST', headers: SBH(), body: JSON.stringify(d) }).then(function(r) { return r.json(); });
}
function UPD(t, q, d) {
  var h = SBH(); h['Prefer'] = 'return=minimal';
  return fetch(SB + '/rest/v1/' + t + '?' + q, { method: 'PATCH', headers: h, body: JSON.stringify(d) });
}
function DEL(t, q) {
  var h = SBH(); h['Prefer'] = 'return=minimal';
  return fetch(SB + '/rest/v1/' + t + '?' + q, { method: 'DELETE', headers: h });
}

function el(id) { return document.getElementById(id); }
function gv(id) { var e = el(id); return e ? e.value.trim() : ''; }
function sv(id, v) { var e = el(id); if (e) e.value = v || ''; }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 5); }

function toast(msg, type) {
  var t = el('toast');
  t.textContent = msg;
  t.className = 'toast on' + (type === 'err' ? ' err' : '');
  clearTimeout(t._t);
  t._t = setTimeout(function() { t.className = 'toast'; }, 2400);
}
function openM(id) { var e = el(id); if (e) e.classList.add('on'); }
function closeM(id) { var e = el(id); if (e) e.classList.remove('on'); }
document.addEventListener('click', function(ev) {
  if (ev.target.classList.contains('mbg')) ev.target.classList.remove('on');
});

function boot() {
  var ME_data = null;
  // Try hub login token
  try { var d = JSON.parse(localStorage.getItem('8b_hub_login') || 'null'); if (d && d.id) ME_data = d; } catch(e) {}
  // Try session
  if (!ME_data) { try { var s = JSON.parse(sessionStorage.getItem('8b_hub_me') || 'null'); if (s && s.id) ME_data = s; } catch(e) {} }
  // Try main app session
  if (!ME_data) { try { var m = JSON.parse(localStorage.getItem('8b_me') || 'null'); if (m && m.id) ME_data = { id: m.id, name: m.name, role: m.role }; } catch(e) {} }

  if (ME_data) {
    ME = ME_data;
    sessionStorage.setItem('8b_hub_me', JSON.stringify(ME));
    enterApp();
    // Load data in background
    GET('employees', 'select=id,name,title,role,active&order=name').then(function(r) { if (Array.isArray(r)) EMPS = r; });
    GET('products', 'select=id,name,store,min_level').then(function(r) { if (Array.isArray(r)) PRODS = r; });
    GET('tasks', 'select=*&order=created_at.desc').then(function(r) {
      if (Array.isArray(r)) { TASKS = r; loadTasks(); }
    });
  } else {
    el('ld').style.display = 'none';
    el('lg').style.display = 'flex';
  }
}

var RL = { manager: 'مدير', reception: 'استقبال', finance: 'مالية', stock: 'مخزون', purchase: 'مشتريات', maintenance: 'صيانة', custom: 'مخصص' };

function enterApp() {
  el('ld').style.display = 'none';
  el('lg').style.display = 'none';
  el('app').style.display = 'flex';
  el('tb-av').textContent = (ME.name || '?').charAt(0);
  el('tb-name').textContent = ME.name;
  el('tb-role').textContent = RL[ME.role] || ME.role;
  if (ME.role === 'manager') {
    el('task-add-btn').innerHTML = '<button class="btn btn-y" onclick="openAddTask()">+ مهمة</button>';
  }
  goScreen('tasks');
}

function doLogout() {
  ME = null;
  sessionStorage.removeItem('8b_hub_me');
  el('app').style.display = 'none';
  el('lg').style.display = 'flex';
}

function goScreen(s) {
  document.querySelectorAll('.screen').forEach(function(e) { e.classList.remove('on'); });
  document.querySelectorAll('.nit').forEach(function(e) { e.classList.remove('on'); });
  var scr = el('s-' + s); if (scr) scr.classList.add('on');
  var ni = el('ni-' + s); if (ni) ni.classList.add('on');
  if (s === 'tasks') loadTasks();
  else if (s === 'checklists') loadChecklists();
  else if (s === 'reference') loadRefs();
  else if (s === 'analytics') loadAnalytics();
}

// TASKS
function loadTasks() { taskTab(null, TASK_TAB); }
function taskTab(btn, id) {
  TASK_TAB = id;
  document.querySelectorAll('#s-tasks .tab').forEach(function(t) { t.classList.remove('on'); });
  if (btn) btn.classList.add('on');
  ['t-mine', 't-auto', 't-all'].forEach(function(pid) {
    var p = el(pid); if (p) p.style.display = p.id === id ? 'block' : 'none';
  });
  if (TASKS.length) {
    if (id === 't-mine') renderMyTasks();
    else if (id === 't-auto') renderAutoTasks();
    else renderAllTasks();
  } else {
    GET('tasks', 'select=*&order=created_at.desc').then(function(rows) {
      TASKS = Array.isArray(rows) ? rows : [];
      if (id === 't-mine') renderMyTasks();
      else if (id === 't-auto') renderAutoTasks();
      else renderAllTasks();
    });
  }
}

var PRI = { high: '🔴', med: '🟡', low: '🟢' };
var STC = { new: 'bb', 'in-progress': 'bo', done: 'bg', cancelled: 'br' };
var STL = { new: 'جديد', 'in-progress': 'جاري', done: 'مكتمل', cancelled: 'ملغي' };

function taskHTML(t) {
  var canDone = String(t.assigned_to) === String(ME.id) || ME.role === 'manager';
  var html = '<div class="task-card">';
  html += '<div style="display:flex;justify-content:space-between;align-items:flex-start">';
  html += '<div style="flex:1"><div class="task-title">' + (PRI[t.priority] || '🟢') + ' ' + (t.title || '') + '</div>';
  if (t.description) html += '<div class="task-meta" style="margin-top:4px">' + t.description + '</div>';
  html += '<div class="task-meta" style="margin-top:6px">' + (t.due_date ? '📅 ' + t.due_date : '') + (t.assigned_by ? ' | ' + t.assigned_by : '') + '</div>';
  html += '</div><span class="badge ' + (STC[t.status] || 'bb') + '">' + (STL[t.status] || t.status) + '</span></div>';
  if (canDone && t.status !== 'done') {
    html += '<button class="btn-sm" style="margin-top:8px;color:var(--gr)" onclick="markDone(\'' + t.id + '\')">✓ إنهاء</button>';
  }
  html += '</div>';
  return html;
}

function renderMyTasks() {
  var c = el('t-mine');
  var mine = TASKS.filter(function(t) { return String(t.assigned_to) === String(ME.id) && t.status !== 'done'; });
  c.innerHTML = mine.length ? mine.map(taskHTML).join('') : '<div class="empty">لا توجد مهام مسندة إليك 🎉</div>';
}

function renderAutoTasks() {
  var c = el('t-auto');
  var auto = [];
  var lp = PRODS.filter(function(p) { return (p.store || 0) <= (p.min_level || 0); });
  if (lp.length && (ME.role === 'manager' || ME.role === 'stock')) {
    auto.push('<div class="task-card"><div class="task-title">⚠️ مخزون منخفض</div><div class="task-meta">' + lp.map(function(p) { return p.name + '(' + p.store + ')'; }).join(' ، ') + '</div></div>');
  }
  GET('maintenance', 'select=description&status=neq.مكتمل').then(function(rows) {
    if (rows && rows.length && (ME.role === 'manager' || ME.role === 'maintenance')) {
      auto.push('<div class="task-card"><div class="task-title">🔧 صيانة مفتوحة (' + rows.length + ')</div></div>');
    }
    GET('purchase_requests', 'select=product&status=eq.بانتظار الموافقة').then(function(prs) {
      if (prs && prs.length && (ME.role === 'manager' || ME.role === 'finance' || ME.role === 'purchase')) {
        auto.push('<div class="task-card"><div class="task-title">🛒 طلبات شراء معلقة (' + prs.length + ')</div></div>');
      }
      c.innerHTML = auto.length ? auto.join('') : '<div class="empty">لا توجد تنبيهات ✓</div>';
    });
  });
}

function renderAllTasks() {
  var c = el('t-all');
  c.innerHTML = TASKS.length ? TASKS.map(taskHTML).join('') : '<div class="empty">لا توجد مهام</div>';
}

function markDone(id) {
  UPD('tasks', 'id=eq.' + id, { status: 'done' }).then(function() {
    toast('تم ✓');
    for (var i = 0; i < TASKS.length; i++) { if (TASKS[i].id === id) { TASKS[i].status = 'done'; break; } }
    renderMyTasks();
  });
}

function openAddTask() {
  sv('tk-title', ''); sv('tk-desc', ''); sv('tk-due', ''); sv('tk-pri', 'med');
  var sel = el('tk-assign');
  if (sel) sel.innerHTML = '<option value="">الكل</option>' + EMPS.map(function(e) { return '<option value="' + e.id + '">' + e.name + '</option>'; }).join('');
  openM('m-task');
}

function saveTask() {
  var title = gv('tk-title');
  if (!title) { toast('أدخل عنوان المهمة', 'err'); return; }
  INS('tasks', { id: uid(), title: title, description: gv('tk-desc'), priority: gv('tk-pri') || 'med', due_date: gv('tk-due') || null, assigned_to: gv('tk-assign') || null, assigned_by: ME.name, status: 'new' }).then(function() {
    toast('تم ✓'); closeM('m-task');
    GET('tasks', 'select=*&order=created_at.desc').then(function(r) { TASKS = Array.isArray(r) ? r : []; renderAllTasks(); });
  }).catch(function() { toast('خطأ', 'err'); });
}

// CHECKLISTS
function loadChecklists() {
  el('cl-date').textContent = new Date().toLocaleDateString('ar-SA', { weekday: 'long', day: 'numeric', month: 'long' });
  var c = el('cl-list');
  c.innerHTML = '<div class="empty">جاري التحميل...</div>';
  GET('checklists', 'select=*&order=title').then(function(rows) {
    rows = Array.isArray(rows) ? rows : [];
    if (!rows.length) { c.innerHTML = '<div class="empty">لا توجد قوائم تحقق</div>'; return; }
    GET('checklist_done', 'select=checklist_id,item_id&done_by=eq.' + ME.id + '&done_date=eq.' + TODAY).then(function(doneRows) {
      var done = {};
      (doneRows || []).forEach(function(d) { done[d.checklist_id + '_' + d.item_id] = true; });
      var types = { cleaning: '🧹', opening: '🔓', closing: '🔒', weekly: '📅' };
      var html = '';
      rows.forEach(function(cl) {
        var items = Array.isArray(cl.items) ? cl.items : [];
        if (typeof cl.items === 'string') { try { items = JSON.parse(cl.items); } catch(e) { items = []; } }
        var dc = items.filter(function(item, idx) { return done[cl.id + '_' + (item.id || idx)]; }).length;
        html += '<div class="card">';
        html += '<div class="card-hd"><span class="card-title">' + (types[cl.type] || '✅') + ' ' + cl.title + '</span>';
        html += '<span class="badge ' + (dc === items.length && items.length ? 'bg' : 'bb') + '">' + dc + '/' + items.length + '</span></div>';
        items.forEach(function(item, idx) {
          var iid = item.id !== undefined ? item.id : idx;
          var isDone = done[cl.id + '_' + iid];
          var lbl = typeof item === 'string' ? item : (item.label || String(item));
          html += '<div class="cl-item">';
          html += '<div class="cl-check' + (isDone ? ' done' : '') + '" onclick="toggleCL(\'' + cl.id + '\',\'' + iid + '\',this)">' + (isDone ? '✓' : '') + '</div>';
          html += '<div class="cl-lbl' + (isDone ? ' done' : '') + '">' + lbl + '</div>';
          html += '</div>';
        });
        html += '</div>';
      });
      c.innerHTML = html;
    });
  });
}

function toggleCL(clId, itemId, el) {
  var isDone = el.classList.contains('done');
  var lbl = el.nextElementSibling;
  if (isDone) {
    DEL('checklist_done', 'checklist_id=eq.' + clId + '&item_id=eq.' + itemId + '&done_by=eq.' + ME.id + '&done_date=eq.' + TODAY);
    el.classList.remove('done'); el.textContent = '';
    if (lbl) lbl.classList.remove('done');
  } else {
    INS('checklist_done', { id: uid(), checklist_id: clId, item_id: String(itemId), done_by: ME.id, done_date: TODAY }).then(function() {
      el.classList.add('done'); el.textContent = '✓';
      if (lbl) lbl.classList.add('done');
    });
  }
}

// REFERENCE
function loadRefs() {
  var c = el('ref-list');
  GET('references_docs', 'select=id,title,icon,type&order=created_at.desc').then(function(rows) {
    rows = Array.isArray(rows) ? rows : [];
    if (!rows.length) { c.innerHTML = '<div class="empty">لا يوجد دليل</div>'; return; }
    var html = '<div class="card">';
    rows.forEach(function(r) {
      html += '<div class="row" style="cursor:pointer" onclick="viewRef(\'' + r.id + '\')">';
      html += '<span style="font-size:22px">' + (r.icon || '📄') + '</span>';
      html += '<div class="row-main">' + r.title + '</div>';
      html += '<span style="color:var(--mt);margin-right:auto">›</span></div>';
    });
    html += '</div>';
    c.innerHTML = html;
  });
}

function viewRef(id) {
  GET('references_docs', 'select=title,content,file_data,type&id=eq.' + id).then(function(rows) {
    if (!rows || !rows.length) return;
    var r = rows[0];
    el('ref-modal-title').textContent = r.title;
    el('ref-modal-content').textContent = r.content || '';
    openM('m-ref');
  });
}

// ANALYTICS
function loadAnalytics() {
  var today = new Date().toISOString().split('T')[0];
  Promise.all([
    GET('withdrawals', 'select=id&created_at=gte.' + today + 'T00:00:00'),
    GET('tasks', 'select=id,status'),
    GET('products', 'select=id&store=lt.min_level'),
    GET('maintenance', 'select=id&status=neq.مكتمل')
  ]).then(function(r) {
    var ops = (r[0] || []).length;
    var tasks = r[1] || [];
    var lp = (r[2] || []).length;
    var maint = (r[3] || []).length;
    var done = tasks.filter(function(t) { return t.status === 'done'; }).length;
    el('an-metrics').innerHTML =
      '<div class="met"><div class="met-n">' + ops + '</div><div class="met-l">عمليات اليوم</div></div>' +
      '<div class="met"><div class="met-n">' + done + '/' + tasks.length + '</div><div class="met-l">مهام مكتملة</div></div>' +
      '<div class="met"><div class="met-n">' + lp + '</div><div class="met-l">مخزون منخفض</div></div>' +
      '<div class="met"><div class="met-n">' + maint + '</div><div class="met-l">صيانة مفتوحة</div></div>';
  });
  GET('budgets', 'select=*&order=month.desc&limit=3').then(function(rows) {
    var c = el('an-content'); if (!c) return;
    if (!rows || !rows.length) { c.innerHTML = ''; return; }
    var html = '<div class="card"><div class="card-hd"><span class="card-title">الميزانيات</span></div>';
    rows.forEach(function(r) {
      var pct = r.amount > 0 ? Math.min(100, Math.round((r.spent || 0) / r.amount * 100)) : 0;
      var clr = pct >= 90 ? '#ef4444' : pct >= 70 ? '#f97316' : '#22c55e';
      html += '<div class="row" style="flex-direction:column;align-items:stretch;gap:4px">';
      html += '<div style="display:flex;justify-content:space-between"><b>' + (r.name || '') + '</b><span class="badge bb">' + (r.month || '') + '</span></div>';
      html += '<div class="bar-wrap"><div class="bar-fill" style="background:' + clr + ';width:' + pct + '%"></div></div>';
      html += '<div style="font-size:10px;color:var(--mt)">' + (r.spent || 0) + ' / ' + r.amount + ' ريال (' + pct + '%)</div></div>';
    });
    html += '</div>';
    c.innerHTML = html;
  });
}

window.onload = boot;
</script>
</body>
</html>
